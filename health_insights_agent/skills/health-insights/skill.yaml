id: health-insights-v1
name: health-insights
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  Medical report analysis agent that extracts health indicators from blood test reports,
  compares values against reference ranges, identifies abnormalities, and provides health insights
  with risk assessment and recommendations.

# Tags and Modes
tags:
  - health-insights
  - medical-analysis
  - blood-report-analysis
  - health-assessment
  - medical-ai
  - risk-evaluation
  - preventive-care

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json
  - text/markdown

# Example Queries
examples:
  - "Analyze the following blood test report for a 35-year-old male patient and provide a detailed medical insight report"
  - "Provide comprehensive health insight report for blood test values: Hemoglobin 12.8 g/dL, Glucose 110 mg/dL, Cholesterol 220 mg/dL"
  - "Interpret blood test parameters, identify abnormal values, and suggest lifestyle improvements"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Blood test report analysis with health indicator extraction and risk assessment"
    features:
      - "Text validation for medical content (minimum 50 chars, medical terminology check)"
      - "Regex-based extraction of 22 health indicators (hemoglobin, glucose, cholesterol, HDL, LDL, triglycerides, WBC, RBC, platelets, creatinine, ALT, AST, ALP, bilirubin, TSH, T4, sodium, potassium, BUN, protein, albumin)"
      - "Reference range comparison using hardcoded ranges"
      - "Abnormality detection (high/low status)"
      - "System-based analysis (blood_count, liver_function, kidney_function, metabolic, thyroid)"
      - "Risk level assessment (low/moderate/high) based on abnormality count and age"
      - "Lifestyle and dietary recommendations based on specific abnormalities"
      - "Markdown-formatted health report generation"
    limitations: "Text-based extraction only, no PDF parsing, no image analysis, no prescription recommendations, not for emergency diagnosis"

  secondary_capability:
    supported: false
    planned_version: "2.0.0"
    description: "Trend analysis and historical tracking not implemented in current version"

# Requirements
requirements:
  packages:
    - "agno"
    - "bindu"
    - "python-dotenv"
  system:
    - "Python 3.12+"
  min_memory_mb: 256
  api_keys:
    - "OPENROUTER_API_KEY (required)"
    - "MEM0_API_KEY (optional, for memory features)"

# Performance Metrics
performance:
  avg_processing_time_ms: 48000
  max_concurrent_requests: 10
  memory_per_request_mb: 256
  scalability: horizontal
  async_task_pattern: true

# Tool Restrictions
allowed_tools:
  - Read
  - Write
  - Execute

# Rich Documentation
documentation:
  overview: |
    Health Insights Agent analyzes blood test reports using OpenRouter LLM (default: Claude 3.5 Sonnet)
    with custom health analysis tools. Built on Agno framework with Bindu protocol integration.

    Core workflow:
    1. Validates medical text content (50+ chars, 3+ medical terms)
    2. Extracts health indicators using regex patterns
    3. Compares values against hardcoded reference ranges
    4. Identifies abnormalities and categorizes by body system
    5. Assesses risk level based on abnormality count and patient age
    6. Generates recommendations for specific abnormalities
    7. Returns markdown-formatted health report

    Uses async task pattern: initial request returns task ID, poll for completion.
    Optional Mem0 integration for conversation memory.

  use_cases:
    when_to_use:
      - "Analyzing text-based blood test reports with standard lab values"
      - "Extracting common health indicators (CBC, metabolic panel, lipid profile, liver/kidney function, thyroid)"
      - "Getting preliminary interpretation of abnormal values"
      - "Understanding health risks based on lab results"
      - "Receiving lifestyle and dietary recommendations"

    when_not_to_use:
      - "Emergency medical situations"
      - "PDF or image-based reports (text extraction not implemented)"
      - "Specialized tests not in the 22 supported indicators"
      - "Prescription or treatment decisions"
      - "Real-time synchronous responses (uses async task pattern)"
      - "Pediatric or pregnancy-specific reference ranges"

  input_structure: |
    JSON-RPC 2.0 message/send request:

    {
      "jsonrpc": "2.0",
      "method": "message/send",
      "params": {
        "message": {
          "role": "user",
          "kind": "message",
          "messageId": "uuid",
          "contextId": "uuid",
          "taskId": "uuid",
          "parts": [
            {
              "kind": "text",
              "text": "Analyze blood test: Hemoglobin 12.8 g/dL, Glucose 110 mg/dL..."
            }
          ]
        },
        "skillId": "health-insights-v1",
        "configuration": {
          "acceptedOutputModes": ["application/json"]
        }
      },
      "id": "request-uuid"
    }

    Text must include health indicator values with units.
    Patient age/gender can be mentioned in text for risk assessment.

  output_format: |
    Initial response (task submitted):
    {
      "jsonrpc": "2.0",
      "id": "request-uuid",
      "result": {
        "id": "task-uuid",
        "context_id": "context-uuid",
        "kind": "task",
        "status": {
          "state": "submitted",
          "timestamp": "2026-03-10T08:19:56.063488+00:00"
        },
        "history": [{"role": "user", "parts": [{"kind": "text", "text": "..."}]}]
      }
    }

    Poll with tasks/get until state is "completed":
    {
      "jsonrpc": "2.0",
      "result": {
        "status": {"state": "completed"},
        "history": [
          {"role": "user", "parts": [{"text": "query"}]},
          {"role": "assistant", "parts": [{"text": "# Health Insights Analysis Report...markdown"}]}
        ],
        "artifacts": [
          {"name": "result", "parts": [{"kind": "text", "text": "markdown report"}]}
        ]
      }
    }

    Report includes: patient summary, test results by system, abnormal findings,
    risk assessment (low/moderate/high), recommendations, next steps, disclaimer.

  error_handling:
    - "Text too short (<50 chars): Returns validation error"
    - "Insufficient medical terms (<3): Returns validation error"
    - "No extractable indicators: Agent proceeds with available context"
    - "Missing patient demographics: Risk assessment uses defaults"
    - "API failures: Standard JSON-RPC error responses"

  examples:
    - title: "Blood Test Analysis Request"
      input:
        text: "Analyze the following blood test report for a 35-year-old male patient. Blood test values: Hemoglobin: 12.8 g/dL, RBC count: 4.2 million/µL, WBC count: 11,200 /µL, Platelets: 240,000 /µL, Fasting Blood Glucose: 110 mg/dL, Total Cholesterol: 220 mg/dL, LDL Cholesterol: 140 mg/dL, HDL Cholesterol: 38 mg/dL, Triglycerides: 190 mg/dL, Vitamin D: 18 ng/mL."
      output:
        initial_response:
          status: "submitted"
          task_id: "9e83c510-5616-49ad-b187-d93cbb800003"
        final_response:
          status: "completed"
          report_sections:
            - "Patient Summary (age, gender, analysis date)"
            - "Test Results Analysis (by parameter with normal ranges)"
            - "Health Risk Assessment (risk level: HIGH)"
            - "Recommendations (lifestyle, diet, monitoring)"
            - "Next Steps (medical consultation timeline)"
          abnormalities_found:
            - "Fasting Blood Glucose: 110 mg/dL (pre-diabetes)"
            - "Total Cholesterol: 220 mg/dL (elevated)"
            - "LDL Cholesterol: 140 mg/dL (high)"
            - "HDL Cholesterol: 38 mg/dL (low)"
            - "Triglycerides: 190 mg/dL (elevated)"

  best_practices:
    for_developers:
      - "Ensure text includes indicator values with units for extraction"
      - "Mention patient age/gender in query for better risk assessment"
      - "Use async task pattern: submit, poll tasks/get until completed"
      - "Expect 10-50 second processing time per analysis"
      - "Medical disclaimers are automatically included in reports"

    for_orchestrators:
      - "Route blood test analysis queries to this skill"
      - "Expect async responses, implement polling logic"
      - "Processing time: 15-50 seconds typical"
      - "Do not route emergency medical queries"
      - "Skill uses OpenRouter API, requires OPENROUTER_API_KEY"
      - "Optional Mem0 integration for conversation context"

  installation: |
    Install via uv package manager:

    uv sync

    Environment variables:
    OPENROUTER_API_KEY=<required>
    MEM0_API_KEY=<optional>
    MODEL_NAME=<optional, default: anthropic/claude-3.5-sonnet>

    Run:
    uv run python -m health_insights_agent
    # Starts server on port 3773 (configurable in agent_config.json)

    Docker:
    docker run -p 3773:3773 -e OPENROUTER_API_KEY=<key> para5/health-insights-agent:latest

  versioning:
    - version: "1.0.0"
      date: "2026-03-10"
      changes: "Initial release with regex-based indicator extraction, reference range comparison, risk assessment, and markdown report generation"
    - version: "1.1.0"
      status: "planned"
      changes: "PDF parsing support, historical trend tracking, expanded indicator set"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "blood test"
    - "medical report"
    - "health indicators"
    - "lab results"
    - "hemoglobin"
    - "glucose"
    - "cholesterol"
    - "abnormal values"
    - "health risk"
    - "medical analysis"

  specializations:
    - domain: "blood-test-analysis"
      confidence_boost: 0.4
    - domain: "health-assessment"
      confidence_boost: 0.3
    - domain: "laboratory-medicine"
      confidence_boost: 0.3

  anti_patterns:
    - "Emergency diagnosis"
    - "Prescription recommendations"
    - "Medical imaging"
    - "PDF/image analysis"
    - "Real-time chat"

  complexity_indicators:
    simple:
      - "Single blood test value check"
      - "Normal range question"
    medium:
      - "Complete blood count analysis"
      - "Lipid panel interpretation"
      - "Multi-parameter report"
    complex:
      - "Comprehensive report with 10+ indicators"
      - "Multi-system abnormality correlation"
      - "Age/gender-specific risk assessment"
